openapi: 3.1.0
info:
  title: Admin BFF Service
  version: 1.0.0
tags:
  - name: Announcements
  - name: CourseRegistrations
  - name: Rooms
  - name: Reservations
  - name: Faculties
  - name: Subjects
  - name: TimetableItems
  - name: Users
paths:
  /v1/announcements:
    get:
      operationId: AnnouncementsV1_list
      parameters: []
      responses:
        '200':
          description: おしらせのリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcements:
                    type: array
                    items:
                      $ref: '#/components/schemas/AnnouncementService.Announcement'
                required:
                  - announcements
      tags:
        - Announcements
    post:
      operationId: AnnouncementsV1_create
      description: おしらせを作成する
      parameters: []
      responses:
        '201':
          description: 作成されたおしらせ
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcement:
                    $ref: '#/components/schemas/AnnouncementService.Announcement'
                required:
                  - announcement
      tags:
        - Announcements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementService.AnnouncementRequest'
        description: 作成するおしらせの情報
  /v1/announcements/{id}:
    get:
      operationId: AnnouncementsV1_detail
      description: おしらせを詳細取得する
      parameters:
        - name: id
          in: path
          required: true
          description: おしらせID
          schema:
            type: string
      responses:
        '200':
          description: おしらせの詳細
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcement:
                    $ref: '#/components/schemas/AnnouncementService.Announcement'
                required:
                  - announcement
      tags:
        - Announcements
    put:
      operationId: AnnouncementsV1_update
      description: おしらせを更新する
      parameters:
        - name: id
          in: path
          required: true
          description: おしらせID
          schema:
            type: string
      responses:
        '200':
          description: 更新されたおしらせ
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcement:
                    $ref: '#/components/schemas/AnnouncementService.Announcement'
                required:
                  - announcement
      tags:
        - Announcements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementService.AnnouncementRequest'
        description: 更新するおしらせの情報
    delete:
      operationId: AnnouncementsV1_delete
      description: おしらせを削除する
      parameters:
        - name: id
          in: path
          required: true
          description: おしらせID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
      tags:
        - Announcements
  /v1/courseRegistrations:
    get:
      operationId: CourseRegistrationsV1_list
      description: 履修情報を取得する
      parameters:
        - name: userId
          in: query
          required: true
          description: ユーザーID
          schema:
            type: string
          explode: false
        - name: year
          in: query
          required: false
          description: 開講年度; 指定しない場合は今年度が選択される
          schema:
            type: integer
          explode: false
        - name: semester
          in: query
          required: true
          description: 開講時期
          schema:
            $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          explode: false
      responses:
        '200':
          description: 履修情報のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  registrations:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.CourseRegistration'
                required:
                  - registrations
      tags:
        - CourseRegistrations
    post:
      operationId: CourseRegistrationsV1_create
      description: 履修情報を作成する
      parameters: []
      responses:
        '201':
          description: 作成された履修情報
          content:
            application/json:
              schema:
                type: object
                properties:
                  registration:
                    $ref: '#/components/schemas/AcademicService.CourseRegistration'
                required:
                  - registration
      tags:
        - CourseRegistrations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.CourseRegistrationRequest'
        description: 作成する履修情報の情報
  /v1/courseRegistrations/{id}:
    delete:
      operationId: CourseRegistrationsV1_delete
      description: 履修情報を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 履修情報ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
      tags:
        - CourseRegistrations
  /v1/faculties:
    get:
      operationId: FacultiesV1_list
      description: 教員一覧を取得する
      parameters: []
      responses:
        '200':
          description: 教員のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  faculties:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.Faculty'
                required:
                  - faculties
      tags:
        - Faculties
    post:
      operationId: FacultiesV1_create
      description: 教員を作成する
      parameters: []
      responses:
        '201':
          description: 作成された教員
          content:
            application/json:
              schema:
                type: object
                properties:
                  faculty:
                    $ref: '#/components/schemas/AcademicService.Faculty'
                required:
                  - faculty
      tags:
        - Faculties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.FacultyRequest'
        description: 作成する教員の情報
  /v1/faculties/{id}:
    get:
      operationId: FacultiesV1_detail
      description: 教員を詳細取得する
      parameters:
        - name: id
          in: path
          required: true
          description: 教員ID
          schema:
            type: string
      responses:
        '200':
          description: 教員の詳細
          content:
            application/json:
              schema:
                type: object
                properties:
                  faculty:
                    $ref: '#/components/schemas/AcademicService.Faculty'
                required:
                  - faculty
      tags:
        - Faculties
    put:
      operationId: FacultiesV1_update
      description: 教員を更新する
      parameters:
        - name: id
          in: path
          required: true
          description: 教員ID
          schema:
            type: string
      responses:
        '200':
          description: 更新された教員
          content:
            application/json:
              schema:
                type: object
                properties:
                  faculty:
                    $ref: '#/components/schemas/AcademicService.Faculty'
                required:
                  - faculty
      tags:
        - Faculties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.FacultyRequest'
        description: 更新する教員の情報
    delete:
      operationId: FacultiesV1_delete
      description: 教員を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 教員ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
      tags:
        - Faculties
  /v1/rooms:
    get:
      operationId: RoomsV1_list
      description: 教室一覧を取得する
      parameters:
        - name: floor
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.Floor'
          explode: false
      responses:
        '200':
          description: 教室のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.Room'
                required:
                  - rooms
      tags:
        - Rooms
    post:
      operationId: RoomsV1_create
      description: 教室を作成する
      parameters: []
      responses:
        '201':
          description: 作成された教室
          content:
            application/json:
              schema:
                type: object
                properties:
                  room:
                    $ref: '#/components/schemas/AcademicService.Room'
                required:
                  - room
      tags:
        - Rooms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.RoomRequest'
        description: 作成する教室の情報
  /v1/rooms/{id}:
    get:
      operationId: RoomsV1_detail
      description: 教室を詳細取得する
      parameters:
        - name: id
          in: path
          required: true
          description: 教室ID
          schema:
            type: string
      responses:
        '200':
          description: 教室の詳細
          content:
            application/json:
              schema:
                type: object
                properties:
                  room:
                    $ref: '#/components/schemas/AcademicService.Room'
                required:
                  - room
      tags:
        - Rooms
    put:
      operationId: RoomsV1_update
      description: 教室を更新する
      parameters:
        - name: id
          in: path
          required: true
          description: 教室ID
          schema:
            type: string
      responses:
        '200':
          description: 更新された教室
          content:
            application/json:
              schema:
                type: object
                properties:
                  room:
                    $ref: '#/components/schemas/AcademicService.Room'
                required:
                  - room
      tags:
        - Rooms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.RoomRequest'
        description: 更新する教室の情報
    delete:
      operationId: RoomsV1_delete
      description: 教室を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 教室ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
      tags:
        - Rooms
  /v1/rooms/{id}/reservations:
    get:
      operationId: ReservationsV1_list
      description: 教室の予約一覧を取得する
      parameters:
        - name: id
          in: path
          required: true
          description: 教室ID
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: 開始日時
          schema:
            type: string
            format: date-time
          explode: false
        - name: until
          in: query
          required: false
          description: 終了日時
          schema:
            type: string
            format: date-time
          explode: false
      responses:
        '200':
          description: 予約のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservations:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.Reservation'
                required:
                  - reservations
      tags:
        - Reservations
  /v1/subjects:
    get:
      operationId: SubjectsV1_list
      description: |-
        科目一覧を取得する

        同一項目同士はOR、異なる項目同士はANDでフィルタリングされます。
      parameters:
        - name: q
          in: query
          required: false
          description: 検索ワード
          schema:
            type: string
          explode: false
        - name: grade
          in: query
          required: false
          description: 学年
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.Grade'
          explode: false
        - name: courses
          in: query
          required: false
          description: コース; 大学院の場合は大学院コースに読み替え
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.Course'
          explode: false
        - name: class
          in: query
          required: false
          description: クラス; 大学院の学年を選択した場合は選択できない
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.Class'
          explode: false
        - name: classification
          in: query
          required: false
          description: '学部: 専門・教養; 大学院: 専門・研究指導'
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.SubjectClassification'
          explode: false
        - name: year
          in: query
          required: false
          description: 開講年度; 指定しない場合は今年度が選択される
          schema:
            type: integer
          explode: false
        - name: semester
          in: query
          required: false
          description: 開講時期
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          explode: false
        - name: requirementType
          in: query
          required: false
          description: 必修・選択・選択必修
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.SubjectRequirementType'
          explode: false
        - name: culturalSubjectCategory
          in: query
          required: false
          description: 教養科目カテゴリ
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CulturalSubjectCategory'
          explode: false
      responses:
        '200':
          description: 科目のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  subjects:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.SubjectSummary'
                required:
                  - subjects
      tags:
        - Subjects
    post:
      operationId: SubjectsV1_upsert
      description: 科目を作成または更新する
      parameters: []
      responses:
        '200':
          description: 作成または更新された科目
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    $ref: '#/components/schemas/AcademicService.Subject'
                required:
                  - subject
      tags:
        - Subjects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.SubjectRequest'
        description: 作成または更新する科目の情報
  /v1/subjects/{id}:
    get:
      operationId: SubjectsV1_detail
      description: 科目を詳細取得する
      parameters:
        - name: id
          in: path
          required: true
          description: 科目ID
          schema:
            type: string
      responses:
        '200':
          description: 科目の詳細
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    $ref: '#/components/schemas/AcademicService.Subject'
                required:
                  - subject
      tags:
        - Subjects
    delete:
      operationId: SubjectsV1_delete
      description: 科目を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 科目ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
      tags:
        - Subjects
  /v1/timetableItmes:
    get:
      operationId: TimetableItemsV1_list
      description: 時間割を取得する
      parameters:
        - name: year
          in: query
          required: false
          description: 開講年度; 指定しない場合は今年度が選択される
          schema:
            type: integer
          explode: false
        - name: semester
          in: query
          required: true
          description: 開講時期
          schema:
            $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          explode: false
        - name: dayOfWeek
          in: query
          required: false
          description: 曜日; 複数指定時はORでフィルタリングされる; 指定しない場合は全ての曜日が選択される
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.DayOfWeek'
          explode: false
      responses:
        '200':
          description: 時間割のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.TimetableItem'
                required:
                  - items
      tags:
        - TimetableItems
    post:
      operationId: TimetableItemsV1_create
      description: 時間割に追加する
      parameters: []
      responses:
        '201':
          description: 作成された時間割
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/AcademicService.TimetableItem'
                required:
                  - item
      tags:
        - TimetableItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.TimetableItemRequest'
        description: 追加する時間割の情報
  /v1/timetableItmes/{id}:
    delete:
      operationId: TimetableItemsV1_delete
      description: 時間割を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 時間割ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
      tags:
        - TimetableItems
  /v1/users/{id}:
    get:
      operationId: UsersV1_detail
      description: ユーザーを取得する
      parameters:
        - name: id
          in: path
          required: true
          description: ユーザーID
          schema:
            type: string
      responses:
        '200':
          description: ユーザーの情報
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserService.User'
                required:
                  - user
      tags:
        - Users
components:
  schemas:
    AcademicService.CourseRegistration:
      type: object
      required:
        - id
        - userId
        - subjectId
      properties:
        id:
          type: string
        userId:
          type: string
        subjectId:
          type: string
    AcademicService.CourseRegistrationRequest:
      type: object
      required:
        - userId
        - subjectId
      properties:
        userId:
          type: string
        subjectId:
          type: string
    AcademicService.Faculty:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
      description: 教員
    AcademicService.FacultyRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
    AcademicService.Reservation:
      type: object
      required:
        - startAt
        - endAt
        - title
      properties:
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        title:
          type: string
    AcademicService.Room:
      type: object
      required:
        - id
        - name
        - floor
      properties:
        id:
          type: string
        name:
          type: string
        floor:
          $ref: '#/components/schemas/DottoFoundationV1.Floor'
    AcademicService.RoomRequest:
      type: object
      required:
        - name
        - floor
      properties:
        name:
          type: string
        floor:
          $ref: '#/components/schemas/DottoFoundationV1.Floor'
    AcademicService.Subject:
      type: object
      required:
        - id
        - name
        - faculties
        - year
        - semester
        - credit
        - eligibleAttributes
        - requirements
      properties:
        id:
          type: string
        name:
          type: string
        faculties:
          type: array
          items:
            $ref: '#/components/schemas/AcademicService.SubjectFaculty'
        year:
          type: integer
          description: 開講年度
        semester:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          description: 開講時期
        credit:
          type: integer
          description: 単位数
        eligibleAttributes:
          type: array
          items:
            $ref: '#/components/schemas/AcademicService.SubjectTargetClass'
          description: 授業名末尾の`学年-クラス`をもとに決定
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/AcademicService.SubjectRequirement'
          description: 科目群・科目区分をもとに決定
    AcademicService.SubjectFaculty:
      type: object
      required:
        - facultyId
        - isPrimary
      properties:
        facultyId:
          type: string
        isPrimary:
          type: boolean
    AcademicService.SubjectRequest:
      type: object
      required:
        - syllabusId
      properties:
        syllabusId:
          type: string
    AcademicService.SubjectRequirement:
      type: object
      required:
        - course
        - requirementType
      properties:
        course:
          $ref: '#/components/schemas/DottoFoundationV1.Course'
        requirementType:
          $ref: '#/components/schemas/DottoFoundationV1.SubjectRequirementType'
    AcademicService.SubjectSummary:
      type: object
      required:
        - id
        - name
        - faculties
      properties:
        id:
          type: string
        name:
          type: string
        faculties:
          type: array
          items:
            $ref: '#/components/schemas/AcademicService.SubjectFaculty'
    AcademicService.SubjectTargetClass:
      type: object
      required:
        - grade
      properties:
        grade:
          $ref: '#/components/schemas/DottoFoundationV1.Grade'
        class:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.Class'
          description: 修士課程・博士課程対象の場合はnull
      description: 対象学年・クラス
    AcademicService.TimetableItem:
      type: object
      required:
        - id
        - subjectId
        - dayOfWeek
        - period
        - roomId
      properties:
        id:
          type: string
        subjectId:
          type: string
        dayOfWeek:
          $ref: '#/components/schemas/DottoFoundationV1.DayOfWeek'
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        roomId:
          type: string
    AcademicService.TimetableItemRequest:
      type: object
      required:
        - subjectId
        - dayOfWeek
        - period
        - roomId
      properties:
        subjectId:
          type: string
        dayOfWeek:
          $ref: '#/components/schemas/DottoFoundationV1.DayOfWeek'
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        roomId:
          type: string
    AnnouncementService.Announcement:
      type: object
      required:
        - id
        - title
        - availableFrom
        - url
      properties:
        id:
          type: string
        title:
          type: string
        availableFrom:
          type: string
          format: date-time
        availableUntil:
          type: string
          format: date-time
        url:
          type: string
          format: uri
    AnnouncementService.AnnouncementRequest:
      type: object
      required:
        - title
        - availableFrom
        - url
      properties:
        title:
          type: string
        availableFrom:
          type: string
          format: date-time
        availableUntil:
          type: string
          format: date-time
        url:
          type: string
          format: uri
    DottoFoundationV1.Class:
